<template>
    <section class="blog-section">
        <div class="container">
            <!-- Section Header -->
            <header class="section-header">
                <h1 class="section-title">Blog</h1>
                <p class="section-description">
                    Sharing knowledge, best practices, and insights from my journey as a Salesforce Developer. Stay updated with the latest trends, techniques, and real-world solutions.
                </p>
            </header>

            <!-- Blog Grid -->
            <div class="blog-grid">
                <template for:each={visibleBlogs} for:item="blog">
                    <article class="blog-card" key={blog.id}>
                        <!-- Cover Image -->
                        <div class="blog-image-wrapper" onclick={handleOpenBlog} data-slug={blog.slug}>
                            <img 
                                src={blog.coverImageUrl} 
                                alt={blog.title} 
                                class="blog-image"
                                loading="lazy"
                            />
                            <div class="blog-image-overlay"></div>
                        </div>

                        <!-- Blog Content -->
                        <div class="blog-content">
                            <!-- Meta Info -->
                            <div class="blog-meta">
                                <time class="blog-date">
                                    <svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                        <line x1="16" y1="2" x2="16" y2="6"></line>
                                        <line x1="8" y1="2" x2="8" y2="6"></line>
                                        <line x1="3" y1="10" x2="21" y2="10"></line>
                                    </svg>
                                    {blog.publishedDate}
                                </time>
                                <span class="blog-author">
                                    <svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                        <circle cx="12" cy="7" r="4"></circle>
                                    </svg>
                                    {blog.publishedBy}
                                </span>
                            </div>

                            <!-- Title -->
                            <h2 class="blog-title">
                                <a href=# class="blog-link" onclick={handleOpenBlog} data-slug={blog.slug}>{blog.title}</a>
                            </h2>

                            <!-- Excerpt -->
                            <p class="blog-excerpt">{blog.excerpt}</p>

                            <!-- Footer -->
                            <div class="blog-footer">
                                <!-- <a href={blog.slug} class="read-more-btn"> -->
                                <a class="read-more-btn" onclick={handleOpenBlog} data-slug={blog.slug}>
                                    Read More
                                    <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="5" y1="12" x2="19" y2="12"></line>
                                        <polyline points="12 5 19 12 12 19"></polyline>
                                    </svg>
                                </a>
                            </div>
                        </div>
                    </article>
                </template>
            </div>

            <!-- Empty State -->
            <template if:false={hasBlogs}>
                <div class="empty-state">
                    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H9M7 16h6M7 12h10"></path>
                    </svg>
                    <h3 class="empty-title">No blogs yet</h3>
                    <p class="empty-text">Check back soon for new content!</p>
                </div>
            </template>

            <!-- Load More Button -->
            <template if:true={hasMoreBlogs}>
                <div class="load-more-wrapper">
                    <button class="load-more-btn" onclick={loadMoreBlogs} disabled={isLoading}>
                        <template if:true={isLoading}>
                            <span class="spinner"></span>
                            Loading...
                        </template>
                        <template if:false={isLoading}>
                            Load More
                            <svg class="chevron-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </template>
                    </button>
                </div>
            </template>

            <!-- Blog Count -->
            <template if:true={hasBlogs}>
                <p class="blog-count">
                    Showing {visibleCount} of {totalCount} articles
                </p>
            </template>
        </div>
    </section>
</template>
