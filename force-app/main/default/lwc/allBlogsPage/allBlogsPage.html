<template>
    <section class="blog-section">
        <div class="container">
            <!-- Section Header -->
            <header class="section-header">
                <h1 class="section-title">Salesforce Insights &amp; Tutorials</h1>
                <p class="section-description">
                    Sharing knowledge, best practices, and insights from my journey as a Salesforce Developer. Stay updated with the latest trends, techniques, and real-world solutions.
                </p>
            </header>

            <!-- Category Pills -->
            <div class="filter-bar">
                <div class="pills-track">
                    <template for:each={category} for:item="cat">
                        <button
                            key={cat.value}
                            class={cat.pillClass}
                            data-value={cat.value}
                            onclick={handleCategoryClick}
                            aria-pressed={cat.isActive}
                        >
                            <!-- <span class="pill-dot"></span> -->
                            <span class="pill-label">{cat.label}</span>
                            <span class="pill-count">{cat.count}</span>
                        </button>
                    </template>
                </div>
            </div>

            <!-- Blog Grid -->
            <div class="blog-grid">
                <template for:each={visibleBlogs} for:item="blog">
                    <article class="blog-card" key={blog.id}>
                        <!-- Cover Image -->
                        <div class="blog-image-wrapper" onclick={handleOpenBlog} data-slug={blog.slug}>
                            <img 
                                src={blog.coverImageUrl} 
                                alt={blog.title} 
                                class="blog-image"
                                loading="lazy"
                            />
                            <div class="blog-image-overlay"></div>
                        </div>

                        <!-- Blog Content -->
                        <div class="blog-content">
                            <!-- Meta Info -->
                            <div class="blog-meta">
                                <time class="blog-date">
                                    <svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                        <line x1="16" y1="2" x2="16" y2="6"></line>
                                        <line x1="8" y1="2" x2="8" y2="6"></line>
                                        <line x1="3" y1="10" x2="21" y2="10"></line>
                                    </svg>
                                    {blog.publishedDate}
                                </time>
                                <span class="blog-author">
                                    <svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                        <circle cx="12" cy="7" r="4"></circle>
                                    </svg>
                                    {blog.publishedBy}
                                </span>
                            </div>

                            <!-- Title -->
                            <h2 class="blog-title">
                                <a href=# class="blog-link" onclick={handleOpenBlog} data-slug={blog.slug}>{blog.title}</a>
                            </h2>

                            <!-- Excerpt -->
                            <p class="blog-excerpt">{blog.excerpt}</p>

                            <!-- Footer -->
                            <div class="blog-footer">
                                <!-- <a href={blog.slug} class="read-more-btn"> -->
                                <a class="read-more-btn" onclick={handleOpenBlog} data-slug={blog.slug}>
                                    Read More
                                    <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="5" y1="12" x2="19" y2="12"></line>
                                        <polyline points="12 5 19 12 12 19"></polyline>
                                    </svg>
                                </a>
                            </div>
                        </div>
                    </article>
                </template>
            </div>

            <!-- Empty State -->
            <template if:false={hasBlogs}>
                <div class="empty-state">
                    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H9M7 16h6M7 12h10"></path>
                    </svg>
                    <h3 class="empty-title">No blogs yet</h3>
                    <p class="empty-text">Check back soon for new content!</p>
                </div>
            </template>

            <!-- Load More Button -->
            <template if:true={hasMoreBlogs}>
                <div class="load-more-wrapper">
                    <button class="load-more-btn" onclick={loadMoreBlogs} disabled={isLoading}>
                        <template if:true={isLoading}>
                            <span class="spinner"></span>
                            Loading...
                        </template>
                        <template if:false={isLoading}>
                            Load More
                            <svg class="chevron-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </template>
                    </button>
                </div>
            </template>

            <!-- Blog Count -->
            <template if:true={hasBlogs}>
                <p class="blog-count">
                    Showing {visibleCount} of {totalCount} articles
                </p>
            </template>
        </div>
    </section>

    <div class="mobile-subscribe-banner">
        <div class="mobile-banner-text">
            <template if:true={isSubscribed}>
                <p class="mobile-banner-title">You're subscribed!</p>
                <p class="mobile-banner-sub">Want to stop receiving notifications?</p>
            </template>
            <template if:false={isSubscribed}>
                <p class="mobile-banner-title">Stay in the loop</p>
                <p class="mobile-banner-sub">Get notified when new posts go live</p>
            </template>
        </div>
        <a href=# onclick={handleSubscription} class="mob-sub-icon">
            <template if:true={isSubscribed}>
                <lightning-icon icon-name="utility:notification_off" size="medium" class="mob-sub-icon"></lightning-icon>
            </template>
            <template if:false={isSubscribed}>
                <lightning-icon icon-name="utility:notification" size="medium" class="mob-sub-icon"></lightning-icon>
            </template>
        </a>

        <!-- ── MODAL ── -->
        <template if:true={isModalOpen}>
            <div class="modal-backdrop" onclick={handleBackdropClick}>
                <div class="modal-panel">

                    <!-- Success State -->
                    <template if:true={showSuccess}>
                        <div class="state-screen">
                            <div class="success-ring">
                                <lightning-icon icon-name="action:check" size="small"></lightning-icon>
                                <span class="state-title state-subscribe">You're subscribed!</span>
                            </div>
                            <p class="state-text">Thanks <strong>{submittedName}</strong>! You'll get notified whenever a new blog post goes live.</p>
                            <button class="btn-primary" onclick={closeModal}>Done</button>
                        </div>
                    </template>

                    <!-- Unsubscribe Confirm State -->
                    <template if:true={showUnsubscribeConfirm}>
                        <div class="state-screen">
                            <div class="warning-ring">
                                <lightning-icon icon-name="action:remove_relationship" size="small"></lightning-icon>
                                <span class="state-title state-unsubscribe">Unsubscribe?</span>
                            </div>
                            <p class="state-text">You'll stop receiving blog notifications. You can always resubscribe later.</p>
                            <div class="btn-row">
                                <button class="btn-ghost" onclick={closeModal}>Cancel</button>
                                <button class="btn-danger" onclick={handleUnsubscribe} disabled={isLoading}>
                                    <template if:true={isLoading}>
                                        <span class="spinner"></span>
                                    </template>
                                    <template if:false={isLoading}>
                                        Yes, Unsubscribe
                                    </template>
                                </button>
                            </div>
                        </div>
                    </template>

                    <!-- Unsubscribe Success -->
                    <template if:true={showUnsubscribeSuccess}>
                        <div class="state-screen">
                            <div class="neutral-ring">
                                <lightning-icon icon-name="action:reject" size="medium"></lightning-icon>
                                <span class="state-title state-unsubscribe2">Unsubscribed</span>
                            </div>
                            <p class="state-text">You've been removed from the mailing list. Hope to see you back soon!</p>
                            <button class="btn-primary" onclick={closeModal}>Close</button>
                        </div>
                    </template>

                    <!-- Subscribe Form -->
                    <template if:true={showForm}>
                        <!-- Header -->
                        <div class="modal-header">
                            <div class="modal-header-left">
                                <div class="bell-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                                    </svg>
                                </div>
                                <div>
                                    <h2 class="modal-title">Stay in the loop</h2>
                                    <p class="modal-subtitle">Get notified when new posts go live</p>
                                </div>
                            </div>
                            <button class="close-btn" onclick={closeModal}>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <line x1="18" y1="6" x2="6" y2="18"/>
                                    <line x1="6" y1="6" x2="18" y2="18"/>
                                </svg>
                            </button>
                        </div>

                        <!-- Form Body -->
                        <div class="modal-body">
                            <!-- Error banner -->
                            <template if:true={errorMessage}>
                                <div class="error-banner">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="error-icon">
                                        <circle cx="12" cy="12" r="10"/>
                                        <line x1="12" y1="8" x2="12" y2="12"/>
                                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                                    </svg>
                                    {errorMessage}
                                </div>
                            </template>

                            <!-- Name -->
                            <div class="field-group">
                                <label class="field-label" for="sub-name">Full Name</label>
                                <input
                                    type="text"
                                    id="sub-name"
                                    class={nameInputClass}
                                    placeholder="Govind Singh Solanki"
                                    value={formName}
                                    oninput={handleNameInput}
                                    maxlength="100"
                                />
                                <template if:true={nameError}>
                                    <span class="field-error">{nameError}</span>
                                </template>
                            </div>

                            <!-- Email -->
                            <div class="field-group">
                                <label class="field-label" for="sub-email">Email Address</label>
                                <input
                                    type="email"
                                    id="sub-email"
                                    class={emailInputClass}
                                    placeholder="you@example.com"
                                    value={formEmail}
                                    oninput={handleEmailInput}
                                    maxlength="150"
                                />
                                <template if:true={emailError}>
                                    <span class="field-error">{emailError}</span>
                                </template>
                            </div>

                            <!-- Submit -->
                            <button
                                class="btn-primary btn-full"
                                onclick={handleSubscribe}
                                disabled={isLoading}
                            >
                                <template if:true={isLoading}>
                                    <span class="spinner spinner--white"></span>
                                    Subscribing...
                                </template>
                                <template if:false={isLoading}>
                                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                                    </svg>
                                    Subscribe Now
                                </template>
                            </button>

                            <p class="privacy-note">No spam, ever. Unsubscribe any time.</p>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>
</template>
